<!DOCTYPE html>

<html>
<head>
<link rel="icon" type="image/png" href="favicon.png">
<meta charset="UTF-8">
<title>Create Account</title>
<link rel="stylesheet" href="css/4chan.css">

<style>

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
}

#main{
flex:1;
display:flex;
align-items:center;
justify-content:center;
}

.window{
width:380px;
background:#ece9d8;
border:2px solid #245edb;
box-shadow:0 0 12px rgba(0,0,0,0.3);
font-family:Tahoma, sans-serif;
}

.titlebar{
background:linear-gradient(#4a8cf7,#2b5edb);
color:white;
padding:6px 10px;
font-weight:bold;
}

.body{
padding:20px;
text-align:center;
}

input{
width:90%;
padding:6px;
margin:6px 0;
border:1px solid #7f9db9;
}

button{
margin-top:10px;
padding:6px 16px;
border:1px solid #245edb;
background:#d6e3f5;
cursor:pointer;
}

button:hover{
background:#bcd2f0;
}

.links{
margin-top:10px;
font-size:13px;
}

.links a{
color:#245edb;
text-decoration:none;
}

#message{
margin-top:10px;
font-size:13px;
}

</style>

</head>

<body>

<div id="top-gradient"></div>

<div id="main">

<div class="window">

<div class="titlebar">
Create Account
</div>

<div class="body">

<input id="username" placeholder="Username">

<input id="email" type="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button id="registerBtn">Register</button>

<div id="message"></div>

<div class="links">
<a href="login.html">Already have an account?</a>
</div>

</div>
</div>
</div>

<script type="module">

import { supabase } from "./supabase.js"

const registerBtn = document.getElementById("registerBtn")
const message = document.getElementById("message")

registerBtn.onclick = async () => {

const username = document.getElementById("username").value.trim()
const email = document.getElementById("email").value.trim()
const password = document.getElementById("password").value.trim()

if(!username || !email || !password){
message.style.color="red"
message.textContent="Fill all fields"
return
}

if(password.length < 6){
message.style.color="red"
message.textContent="Password must be at least 6 characters"
return
}

const { data: existing } = await supabase
.from("profiles")
.select("username")
.eq("username", username)

if(existing.length > 0){
message.style.color="red"
message.textContent="Username already taken"
return
}

const { data, error } = await supabase.auth.signUp({
email,
password
})

if(error){
message.style.color="red"
message.textContent=error.message
return
}

await supabase.from("profiles").insert([{
id: data.user.id,
username: username,
is_admin:false
}])

message.style.color="green"
message.textContent="Account created! You can login now."

}

</script>

</body>
</html>
